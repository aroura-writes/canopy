<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      const repoBase = window.location.pathname.split('/').slice(0, 2).join('/') || '/';
      const path = window.location.pathname.replace(repoBase, '') || '/';
      const redirectPath = `${path}${window.location.search}${window.location.hash}`;
      const target = `${repoBase}/?p=${encodeURIComponent(redirectPath)}`;
      window.location.replace(target);
    </script>
  </head>
  <body></body>
</html>
